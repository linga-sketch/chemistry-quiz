<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who Wants to Be a Millionaire — Chemistry Edition</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000508;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: Georgia, 'Times New Roman', serif;
    }

    #app {
      width: 100%;
      max-width: 820px;
      min-height: 600px;
      background: #040c1a;
      color: #e8d5a0;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 60px rgba(20, 60, 180, 0.3);
      border: 1px solid rgba(100,160,230,0.2);
    }

    #screen { position: relative; z-index: 1; padding: 16px; }

    .gold-bar {
      position: absolute; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, #7a5800, #f0c040, #c89010, #f0c040, #7a5800);
      z-index: 10;
    }
    .top-bar { top: 0; }
    .bot-bar { bottom: 0; }

    .title {
      font-family: Georgia, serif;
      text-align: center; font-size: 22px; color: #f0c040;
      letter-spacing: 3px; padding-top: 16px; font-weight: bold;
    }
    .subtitle {
      text-align: center; font-size: 12px; color: #5a7a9a;
      letter-spacing: 2px; margin-bottom: 6px; font-family: Arial, sans-serif;
    }

    .score-bar {
      display: flex; justify-content: center; gap: 6px;
      padding: 6px 8px 0; flex-wrap: wrap;
    }
    .dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: rgba(60,90,140,0.5);
      border: 1px solid rgba(100,150,220,0.3); flex-shrink: 0;
    }
    .dot.done-c { background: #30a060; border-color: #30a060; }
    .dot.done-w { background: #a03030; border-color: #a03030; }
    .dot.cur-d  { background: #f0c040; border-color: #f0c040; }

    .prize-ladder {
      position: absolute; right: 12px; top: 65px;
      display: flex; flex-direction: column-reverse; gap: 2px;
      z-index: 2; max-height: 480px; overflow: hidden;
    }
    .rung {
      font-family: Arial, sans-serif; font-size: 10px;
      color: #3a5a7a; padding: 2px 7px; text-align: right;
      letter-spacing: 1px; border-radius: 3px;
    }
    .rung.cur  { color: #f0c040; background: rgba(240,192,64,0.12); font-weight: bold; font-size: 11px; }
    .rung.safe { color: #2a8a50; }
    .rung.done { color: #1a3a28; }

    .qbox {
      background: rgba(15,35,80,0.9);
      border: 1px solid rgba(100,160,230,0.4); border-radius: 10px;
      padding: 18px 20px; margin: 50px 115px 14px 8px;
      text-align: center; min-height: 100px;
      display: flex; flex-direction: column; justify-content: center; gap: 8px;
    }
    .qnum {
      font-family: Arial, sans-serif; font-size: 10px;
      color: #f0c040; letter-spacing: 3px;
    }
    .diff-badge {
      display: inline-block; font-size: 10px; letter-spacing: 1px;
      padding: 2px 8px; border-radius: 4px;
      font-family: Arial, sans-serif;
    }
    .diff-easy   { background: rgba(20,80,40,0.5);  color: #50c878; border: 1px solid rgba(50,200,100,0.4); }
    .diff-medium { background: rgba(80,60,10,0.5);  color: #f0c040; border: 1px solid rgba(240,192,64,0.4); }
    .diff-hard   { background: rgba(80,20,20,0.5);  color: #e06060; border: 1px solid rgba(200,60,60,0.4); }

    .qtext {
      font-family: Georgia, serif; font-size: 18px;
      color: #e8d5a0; line-height: 1.5; white-space: pre-wrap;
    }

    .grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin: 0 8px 10px;
    }
    .abtn {
      background: rgba(15,35,80,0.85);
      border: 1px solid rgba(100,160,230,0.4); border-radius: 8px;
      padding: 12px 14px; cursor: pointer;
      font-family: Arial, sans-serif; font-size: 14px;
      color: #c8d8f0; text-align: left;
      display: flex; align-items: center; gap: 10px;
      min-height: 54px; transition: background 0.15s, border-color 0.15s;
    }
    .abtn:hover:not([disabled]) {
      background: rgba(40,80,160,0.9);
      border-color: rgba(200,180,100,0.6); color: #f0d870;
    }
    .abtn[disabled] { cursor: default; }
    .abtn.sel   { background: rgba(140,110,20,0.9); border-color: rgba(240,192,64,0.8); color: #f0c040; }
    .abtn.corr  { background: rgba(20,100,50,0.9);  border-color: rgba(50,200,100,0.8); color: #50c878; }
    .abtn.wrong { background: rgba(100,20,20,0.9);  border-color: rgba(200,60,60,0.8);  color: #e06060; }
    .aletter { font-family: Georgia, serif; font-size: 14px; font-weight: bold; color: #f0c040; min-width: 18px; flex-shrink: 0; }
    .fifty-hide { visibility: hidden; }

    .lifelines {
      display: flex; gap: 10px; justify-content: center; padding: 0 8px 10px;
    }
    .ll {
      font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 1px;
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid rgba(240,192,64,0.5);
      background: rgba(240,192,64,0.08); color: #f0c040; cursor: pointer;
    }
    .ll:hover:not([disabled]) { background: rgba(240,192,64,0.2); border-color: #f0c040; }
    .ll[disabled] { opacity: 0.25; cursor: default; text-decoration: line-through; }

    .statusbar {
      text-align: center; font-family: Georgia, serif;
      font-size: 14px; letter-spacing: 2px;
      padding: 4px 16px 8px; min-height: 32px; color: #f0c040;
    }
    .actions { display: flex; justify-content: center; gap: 10px; padding-bottom: 20px; }

    .fa-btn {
      font-family: Georgia, serif; font-size: 13px; letter-spacing: 2px;
      padding: 10px 26px; border-radius: 8px;
      border: 1px solid rgba(240,192,64,0.6);
      background: rgba(180,130,10,0.2);
      color: #f0c040; cursor: pointer;
    }
    .fa-btn:hover:not([disabled]) { background: rgba(240,192,64,0.25); }
    .fa-btn[disabled] { opacity: 0.35; cursor: default; }

    .walk-btn {
      font-family: Arial, sans-serif; font-size: 11px; letter-spacing: 1px;
      padding: 10px 18px; border-radius: 8px;
      border: 1px solid rgba(100,150,220,0.4);
      background: transparent; color: #7a9cc0; cursor: pointer;
    }
    .walk-btn:hover { border-color: #7a9cc0; color: #a0c0e0; }

    @media (max-width: 540px) {
      .grid { grid-template-columns: 1fr; }
      .prize-ladder { display: none; }
      .qbox { margin-right: 8px; }
      .title { font-size: 16px; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
</div>
<script>
var Qs = [
  {q:"Which particle determines the identity of an element?",a:["Proton","Neutron","Electron","Photon"],c:0,d:"easy"},
  {q:"What is the electron configuration of sodium?",a:["1s\u00B22s\u00B22p\u2075","1s\u00B22s\u00B22p\u2076 3s\u00B9","1s\u00B22s\u00B22p\u2076","1s\u00B22s\u00B22p\u2076 3p\u00B9"],c:1,d:"easy"},
  {q:"Which element has the largest atomic radius?",a:["Li","Na","K","Rb"],c:3,d:"easy"},
  {q:"Which compound forms between Mg\u00B2\u207A and Cl\u207B?",a:["MgCl","Mg\u2082Cl","MgCl\u2082","Mg\u2082Cl\u2082"],c:2,d:"easy"},
  {q:"What is the atomic number of an element equal to?",a:["Number of neutrons","Number of protons","Mass number","Number of electrons only"],c:1,d:"easy"},
  {q:"Which element is located in Group 18?",a:["Sodium","Calcium","Oxygen","Neon"],c:3,d:"easy"},
  {q:"Which compound is ionic?",a:["NaCl","H\u2082O","CH\u2084","CO\u2082"],c:0,d:"easy"},
  {q:"How many moles are in 18 g of H\u2082O?",a:["0.5 mol","1 mol","2 mol","18 mol"],c:1,d:"easy"},
  {q:"What is the molar mass of CO\u2082?",a:["18 g/mol","28 g/mol","44 g/mol","48 g/mol"],c:2,d:"easy"},
  {q:"Which diagram represents a pure substance?",a:["Two different unbonded atoms","Identical molecules throughout","A mixture of atoms and molecules","Two different compounds together"],c:1,d:"easy"},
  {q:"What is the electron configuration of lithium?",a:["1s\u00B22s\u00B9","1s\u00B22s\u00B2","1s\u00B22p\u00B9","1s\u00B92s\u00B2"],c:0,d:"easy"},
  {q:"How many valence electrons does oxygen have?",a:["2","4","6","8"],c:2,d:"easy"},
  {q:"Which particle has no charge?",a:["Proton","Electron","Neutron","Ion"],c:2,d:"easy"},
  {q:"How many atoms are in 2 moles of carbon?",a:["6.02 \u00D7 10\u00B2\u00B3","1.20 \u00D7 10\u00B2\u2074","3.01 \u00D7 10\u00B2\u00B3","12.0 \u00D7 10\u00B2\u00B3"],c:1,d:"medium"},
  {q:"Which isotope notation is correct for carbon-14?",a:["\u00B9\u2074\u2086C","\u2086\u00B9\u2074C","\u00B9\u2074\u00B9\u00B2C","\u2086\u2088C"],c:0,d:"medium"},
  {q:"A sample contains two gases evenly mixed together. This is best described as:",a:["A pure element","A pure compound","A homogeneous mixture","A heterogeneous mixture"],c:2,d:"medium"},
  {q:"Which element has the highest electronegativity?",a:["Oxygen","Fluorine","Chlorine","Nitrogen"],c:1,d:"medium"},
  {q:"Which element would have the highest first ionization energy?",a:["Na","Mg","Al","Ar"],c:3,d:"medium"},
  {q:"What is the molar mass of NaCl?",a:["35.5 g/mol","58.5 g/mol","23.0 g/mol","46.0 g/mol"],c:1,d:"medium"},
  {q:"Which ion does magnesium form?",a:["Mg\u207A","Mg\u00B2\u207A","Mg\u00B3\u207A","Mg\u207B"],c:1,d:"medium"},
  {q:"The tallest peak on a mass spectrum represents:",a:["The least abundant isotope","The most abundant isotope","The heaviest isotope","The lightest isotope"],c:1,d:"medium"},
  {q:"An element has the electron configuration:\n1s\u00B2 2s\u00B2 2p\u2076 3s\u00B2 3p\u2075\nWhat element is it?",a:["Sulfur","Chlorine","Argon","Bromine"],c:1,d:"hard"},
  {q:"Which atom has the smallest atomic radius?",a:["Na","Mg","Al","Cl"],c:3,d:"hard"},
  {q:"How many grams are in 0.50 mol of O\u2082?",a:["8 g","16 g","24 g","32 g"],c:1,d:"hard"},
  {q:"In photoelectron spectroscopy, electrons closest to the nucleus have:",a:["Lower binding energy","Higher binding energy","Equal binding energy","No binding energy"],c:1,d:"hard"},
  {q:"Which formula represents aluminum oxide?",a:["AlO","Al\u2082O","Al\u2082O\u2083","Al\u2083O\u2082"],c:2,d:"hard"},
  {q:"A sample contains visible layers of substances. This is classified as:",a:["Pure substance","Homogeneous mixture","Heterogeneous mixture","Ionic compound"],c:2,d:"hard"},
  {q:"What is the percent composition of oxygen in H\u2082O?",a:["11%","33%","67%","89%"],c:3,d:"hard"},
  {q:"Which element has the greatest number of valence electrons?",a:["Carbon","Nitrogen","Oxygen","Neon"],c:3,d:"hard"},
  {q:"Which of the following species is isoelectronic with Ne?",a:["Na\u207A","Mg\u00B2\u207A","F\u207B","All of the above"],c:3,d:"hard"},
  {q:"FINAL QUESTION\nAn unknown element's PES spectrum shows peaks:\n2e in 1s, 2e in 2s, 5e in 2p.\nWhich element is this?",a:["Carbon","Nitrogen","Oxygen","Fluorine"],c:3,d:"hard"}
];

var PRIZES=["$100","$200","$300","$500","$1,000","$2,000","$4,000","$8,000","$16,000","$32,000","$64,000","$125,000","$250,000","$500,000","$1M","$2M","$4M","$8M","$16M","$32M","$64M","$125M","$250M","$500M","$1M","$2M","$4M","$8M","$16M","$1,000,000"];
var SAFES=[9,19];
var L=["A","B","C","D"];
var DLABEL={easy:"Easy",medium:"Medium",hard:"AP Level"};
var gs={i:0,sel:null,rev:false,ll:{f:true,p:true,a:true},fh:null,done:false,walk:false,won:false,hist:[]};

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function dots(){
  var h='<div class="score-bar">';
  for(var i=0;i<Qs.length;i++){
    var cl="dot";
    if(gs.hist[i]===true) cl+=" done-c";
    else if(gs.hist[i]===false) cl="dot done-w";
    else if(i===gs.i&&!gs.done&&!gs.walk) cl+=" cur-d";
    h+='<div class="'+cl+'" title="Q'+(i+1)+'"></div>';
  }
  return h+"</div>";
}

function ladder(){
  var h='<div class="prize-ladder">';
  for(var i=Qs.length-1;i>=0;i--){
    var cl="rung";
    if(i===gs.i) cl+=" cur";
    else if(i<gs.i) cl+=" done";
    if(SAFES.indexOf(i)>-1) cl+=" safe";
    h+='<div class="'+cl+'">'+PRIZES[i]+"</div>";
  }
  return h+"</div>";
}

function render(){
  var el=document.getElementById("screen");
  if(gs.done||gs.walk){renderEnd(el);return;}
  var q=Qs[gs.i];
  var ans="";
  for(var j=0;j<q.a.length;j++){
    var hide=gs.fh&&gs.fh.indexOf(j)>-1;
    var cl="abtn"+(hide?" fifty-hide":"");
    if(gs.rev){if(j===q.c) cl+=" corr"; else if(j===gs.sel) cl+=" wrong";}
    else if(j===gs.sel) cl+=" sel";
    var dis=(gs.rev||hide)?"disabled":"";
    ans+='<button class="'+cl+'" onclick="pick('+j+')" '+dis+'><span class="aletter">'+L[j]+'</span><span>'+esc(q.a[j])+"</span></button>";
  }
  var isCor=gs.rev&&gs.sel===q.c;
  var isWrong=gs.rev&&gs.sel!==null&&gs.sel!==q.c;
  var isLast=gs.i===Qs.length-1;
  var status="";
  if(isCor&&!isLast) status="🎉 CORRECT!";
  else if(isCor&&isLast) status="🏆 YOU WIN THE MILLION!";
  else if(isWrong) status="❌ INCORRECT — GAME OVER";
  else if(gs.sel!==null&&!gs.rev) status="Is that your final answer?";
  var acts="";
  if(!gs.rev){
    acts='<button class="fa-btn" onclick="doFinal()" '+(gs.sel===null?"disabled":"")+'>FINAL ANSWER</button><button class="walk-btn" onclick="doWalk()">WALK AWAY</button>';
  } else if(isCor&&!isLast){
    acts='<button class="fa-btn" onclick="next()">NEXT QUESTION &#8594;</button>';
  } else {
    acts='<button class="fa-btn" onclick="restart()">PLAY AGAIN</button>';
  }
  el.innerHTML=
    '<div class="gold-bar top-bar"></div>'+
    '<div class="title">WHO WANTS TO BE A MILLIONAIRE</div>'+
    '<div class="subtitle">CHEMISTRY EDITION</div>'+
    dots()+ladder()+
    '<div class="qbox">'+
      '<div class="qnum">QUESTION '+(gs.i+1)+' OF '+Qs.length+'</div>'+
      '<div><span class="diff-badge diff-'+q.d+'">'+DLABEL[q.d]+'</span></div>'+
      '<div class="qtext">'+esc(q.q)+'</div>'+
    '</div>'+
    '<div class="lifelines">'+
      '<button class="ll" onclick="ll50()" '+(!gs.ll.f||gs.rev?"disabled":"")+'>50:50</button>'+
      '<button class="ll" onclick="llPhone()" '+(!gs.ll.p||gs.rev?"disabled":"")+'>Phone a Friend</button>'+
      '<button class="ll" onclick="llAud()" '+(!gs.ll.a||gs.rev?"disabled":"")+'>Ask the Audience</button>'+
    '</div>'+
    '<div class="grid">'+ans+'</div>'+
    '<div class="statusbar">'+status+'</div>'+
    '<div class="actions">'+acts+'</div>'+
    '<div class="gold-bar bot-bar"></div>';
}

function pick(j){if(gs.rev)return;gs.sel=j;render();}

function doFinal(){
  if(gs.sel===null)return;
  gs.rev=true;
  gs.hist[gs.i]=(gs.sel===Qs[gs.i].c);
  render();
  if(gs.sel!==Qs[gs.i].c){setTimeout(function(){gs.done=true;render();},2200);}
  else if(gs.i===Qs.length-1){setTimeout(function(){gs.done=true;gs.won=true;render();},2200);}
}

function next(){gs.i++;gs.sel=null;gs.rev=false;gs.fh=null;render();}
function doWalk(){gs.walk=true;render();}

function restart(){
  gs={i:0,sel:null,rev:false,ll:{f:true,p:true,a:true},fh:null,done:false,walk:false,won:false,hist:[]};
  render();
}

function ll50(){
  gs.ll.f=false;
  var q=Qs[gs.i];
  var wrong=[];
  for(var i=0;i<4;i++){if(i!==q.c)wrong.push(i);}
  gs.fh=[wrong[0],wrong[1]];
  render();
}

function llPhone(){
  gs.ll.p=false;
  var q=Qs[gs.i];
  alert("📞 Your friend says: \"I'm pretty sure the answer is "+L[q.c]+"... "+q.a[q.c]+"!\"");
  render();
}

function llAud(){
  gs.ll.a=false;
  var q=Qs[gs.i];
  var p=[0,0,0,0];
  p[q.c]=55+Math.floor(Math.random()*25);
  var rest=100-p[q.c];
  for(var i=0;i<4;i++){if(i!==q.c)p[i]=Math.floor(Math.random()*rest*0.4);}
  p[q.c]+=100-p.reduce(function(a,b){return a+b;},0);
  var bars=L.map(function(l,i){
    var filled=Math.round(p[i]/5);
    var empty=20-filled;
    return l+": "+"█".repeat(filled)+"░".repeat(empty)+" "+p[i]+"%";
  }).join("\n");
  alert("👥 Audience Poll:\n\n"+bars);
  render();
}

function renderEnd(el){
  var safe=null;
  for(var i=0;i<SAFES.length;i++){if(SAFES[i]<gs.i)safe=SAFES[i];}
  var prize=gs.won?PRIZES[Qs.length-1]:gs.walk&&gs.i>0?PRIZES[gs.i-1]:safe!==null?PRIZES[safe]:"$0";
  var msg=gs.won?"YOU ARE A MILLIONAIRE!":gs.walk?"YOU WALKED AWAY WITH "+prize:"YOU LEAVE WITH "+prize;
  var sub=gs.won?"🏆 CONGRATULATIONS 🏆":gs.walk?"A WISE DECISION":"BETTER LUCK NEXT TIME";
  var correct=gs.hist.filter(Boolean).length;
  el.innerHTML=
    '<div class="gold-bar top-bar"></div>'+
    '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:500px;padding:32px 20px;text-align:center;gap:18px">'+
      '<div style="font-family:Arial,sans-serif;font-size:12px;letter-spacing:4px;color:#5a7a9a">FINAL RESULT</div>'+
      '<div style="font-family:Georgia,serif;font-size:42px;font-weight:bold;color:#f0c040;line-height:1.2">'+prize+'</div>'+
      '<div style="font-family:Georgia,serif;font-size:16px;letter-spacing:3px;color:#c8d8f0">'+msg+'</div>'+
      '<div style="font-size:18px;color:#5a7a9a;letter-spacing:2px">'+sub+'</div>'+
      '<div style="font-size:13px;color:#5a7a9a;margin-top:4px">Answered '+correct+' of '+Qs.length+' correctly</div>'+
      dots()+
      '<button class="fa-btn" style="margin-top:12px" onclick="restart()">PLAY AGAIN</button>'+
    '</div>'+
    '<div class="gold-bar bot-bar"></div>';
}

render();
</script>
</body>
</html>
